name: Release

on:
  push:
    tags:
      - "v*"
permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish-npm:
    name: Build and publish to NPM
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve release version
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          PKG_VER=$(node -p "require('./package.json').version")
          if [[ "${{ github.event_name }}" == "push" ]]; then
            if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid tag (expected v1.2.3): $TAG"
              exit 1
            fi
            TAG_VER="${TAG#v}"
            if [[ "$TAG_VER" != "$PKG_VER" ]]; then
              echo "Tag v$TAG_VER must match package.json version $PKG_VER"
              exit 1
            fi
          fi
          echo "version_no_v=$PKG_VER" >> "$GITHUB_ENV"
          echo "Resolved @kumix/worker@$PKG_VER"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Bun cache
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run types:check

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Verify package
        run: npm pack --dry-run

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release summary
        run: |
          echo "Published @kumix/worker@${{ env.version_no_v }} to npm"
          echo "Install: npm install -g @kumix/worker@${{ env.version_no_v }}"
          echo "CLI: kumix-worker"

  publish-docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify tag matches package.json
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          PKG_VER=$(node -p "require('./package.json').version")
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag (expected v1.2.3): $TAG"
            exit 1
          fi
          TAG_VER="${TAG#v}"
          if [[ "$TAG_VER" != "$PKG_VER" ]]; then
            echo "Tag v$TAG_VER must match package.json version $PKG_VER"
            exit 1
          fi
          echo "Docker release @kumix/worker@$PKG_VER"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/kumixlabs/worker
            kumix/worker
          # flavor defaults to latest=auto, which produces a `latest` tag
          # automatically for non-prerelease semver tags. The raw line that was
          # here before used {{is_default_branch}}, which is always false on tag
          # pushes and therefore never produced latest.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/kumixlabs/worker:buildcache
          cache-to: type=registry,ref=ghcr.io/kumixlabs/worker:buildcache,mode=max
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true
