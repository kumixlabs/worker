name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish to NPM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          PKG_VER=$(node -p "require('./package.json').version")
          if [[ "${{ github.event_name }}" == "push" ]]; then
            if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid tag (expected v1.2.3): $TAG"
              exit 1
            fi
            TAG_VER="${TAG#v}"
            if [[ "$TAG_VER" != "$PKG_VER" ]]; then
              echo "Tag v$TAG_VER must match package.json version $PKG_VER"
              exit 1
            fi
          fi
          echo "version_no_v=$PKG_VER" >> "$GITHUB_ENV"
          echo "Resolved @tubeforge/worker@$PKG_VER"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run types:check

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Verify package
        run: npm pack --dry-run

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release summary
        run: |
          echo "Published @tubeforge/worker@${{ env.version_no_v }} to npm"
          echo "Install: npm install -g @tubeforge/worker@${{ env.version_no_v }}"
          echo "CLI: forge-worker"
